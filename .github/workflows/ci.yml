name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
      - 'nuget.config'
      - '.github/workflows/ci.yml'
      - '.github/workflows/build-and-test.yml'
  # Allows re-running CI manually from the Actions tab (useful for flaky failures)
  workflow_dispatch:

# Cancel previous runs for the same PR to save runner minutes
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}   # deny all by default; each job grants only what it needs

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Dependency Review
        uses: actions/dependency-review-action@v4.9.0

  build-and-test:
    name: Build & Test
    uses: ./.github/workflows/build-and-test.yml
    secrets: inherit
