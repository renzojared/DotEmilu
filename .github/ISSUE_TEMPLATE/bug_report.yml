---
name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill out the sections below so we can reproduce and fix the issue.

  - type: checkboxes
    id: existing
    attributes:
      label: Is there an existing issue?
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true

  - type: input
    id: package
    attributes:
      label: Package
      description: Which DotEmilu package is affected?
      placeholder: "e.g. DotEmilu, DotEmilu.AspNetCore, DotEmilu.EntityFrameworkCore"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "e.g. 10.0.0"
    validations:
      required: true

  - type: input
    id: dotnet-version
    attributes:
      label: .NET version
      placeholder: "e.g. .NET 10.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the behavior.
      render: csharp
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Stack traces, screenshots, related issues, etc.
    validations:
      required: false
